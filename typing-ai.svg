<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style><![CDATA[
      .bg { fill: #000; }
      .txt { font: 700 48px 'Courier New', monospace; fill:#39FF14; }
      .caret { fill: #39FF14; }
    ]]></style>
  </defs>
  <rect class="bg" width="100%" height="100%" />
  <text class="txt" x="20" y="70">
    <tspan opacity="1">A</tspan>
    <tspan opacity="0"><animate attributeName="opacity" begin="0.2s" dur="0.01s" to="1" fill="freeze"/>I</tspan>
    <tspan opacity="0"><animate attributeName="opacity" begin="0.4s" dur="0.01s" to="1" fill="freeze"/> </tspan>
    <tspan opacity="0"><animate attributeName="opacity" begin="0.6s" dur="0.01s" to="1" fill="freeze"/>T</tspan>
    <tspan opacity="0"><animate attributeName="opacity" begin="0.8s" dur="0.01s" to="1" fill="freeze"/>y</tspan>
    <tspan opacity="0"><animate attributeName="opacity" begin="1.0s" dur="0.01s" to="1" fill="freeze"/>p</tspan>
    <tspan opacity="0"><animate attributeName="opacity" begin="1.2s" dur="0.01s" to="1" fill="freeze"/>i</tspan>
    <tspan opacity="0"><animate attributeName="opacity" begin="1.4s" dur="0.01s" to="1" fill="freeze"/>n</tspan>
    <tspan opacity="0"><animate attributeName="opacity" begin="1.6s" dur="0.01s" to="1" fill="freeze"/>g</tspan>
  </text>
  <!-- Caret that blinks -->
  <rect class="caret" x="220" y="30" width="10" height="40" rx="2">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </rect>
</svg>
